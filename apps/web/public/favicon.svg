<svg
  viewBox="0 0 32 32"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="El Guacal"
>
  <title>El Guacal</title>
  <!--
    Map pin filled with Venezuelan flag stripes (yellow, blue, red
    top to bottom) via a linear gradient with hard colour stops.
    The pin says "locator"; the flag says "Venezuelan." Together
    they read as "find Venezuelan things here." 2px ink outline
    matches the structural border width token. Flag colours use
    the same values as the palette tokens in ADR 0014. See ADR
    0015 for the full decision record.
    Keep in sync with apps/web/app/components/logo/index.tsx.
  -->
  <defs>
    <linearGradient id="flag" gradientUnits="userSpaceOnUse"
      x1="16" y1="1" x2="16" y2="31">
      <stop offset="0" stop-color="#FCD116" />
      <stop offset="0.3333" stop-color="#FCD116" />
      <stop offset="0.3333" stop-color="#00247D" />
      <stop offset="0.6667" stop-color="#00247D" />
      <stop offset="0.6667" stop-color="#CF142B" />
      <stop offset="1" stop-color="#CF142B" />
    </linearGradient>
  </defs>
  <path
    d="M16 1C9.4 1 4 6.1 4 12.4c0 3 1.4 6.2 3.6 9.4
       C10 25.2 13.2 28.4 16 31c2.8-2.6 6-5.8 8.4-9.2
       C26.6 18.6 28 15.4 28 12.4 28 6.1 22.6 1 16 1z"
    fill="url(#flag)"
    stroke="#0b0c0c"
    stroke-width="2"
    stroke-linejoin="round"
  />
</svg>
