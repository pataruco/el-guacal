name: Release
run-name: ${{ github.actor }} is releasing

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release.yaml
      - "**/CHANGELOG.md"
      - apps/**

permissions:
  contents: write
  pull-requests: write

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
        # v4.4
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38
        with:
          token: ${{ secrets.RELEASE_PLEASE_GH_TOKEN }}
  ci-validation:
    name: CI validation
    needs: [release-please]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout 🛎️
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check jobs for errors
        uses: ./.github/actions/ci-validation
        with:
          jobs: ${{ toJSON(needs) }}
