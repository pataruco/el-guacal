name: Daily database export
run-name: ${{ github.actor }} is exporting the database and releasing it

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛎️ Checkout
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: 📆 Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: 📦 Download export from server
        run: |
          curl -L -o el-guacal-db-${{ steps.date.outputs.date }}.zip https://el-guacal-api-2m7hvbqwdq-nw.a.run.app/api/export/zip

      - name: 🚀 Release
        run: |
          gh release create "data-export@${{ steps.date.outputs.date }}" \
            --title "data-export@${{ steps.date.outputs.date }}" \
            --notes "Daily automated data export of El Guacal database." \
            el-guacal-db-${{ steps.date.outputs.date }}.zip
