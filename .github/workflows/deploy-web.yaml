name: Deploy web to production
run-name: ${{ github.actor }} is deploying web to Firebase Hosting with tag ${{ github.event.inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Select the web tag to deploy to production"
        required: true
        type: string
        default: "web-v0.1.0"

concurrency:
  cancel-in-progress: true
  group: "${{ github.workflow }} @ ${{ github.ref }}"

jobs:
  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Set environment and install dependencies
        uses: ./.github/actions/prepare

      - name: Run tests
        shell: bash
        run: |
          pnpm exec moon run web:test

  build-and-deploy:
    name: 📦 Build and deploy
    runs-on: ubuntu-latest
    needs: [test]
    environment:
      name: el-guacal-api

    # Required permissions for Workload Identity Federation
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Set environment and install dependencies
        uses: ./.github/actions/prepare

      - name: Build web app
        shell: bash
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_MAPS_ID: ${{ vars.VITE_GOOGLE_MAPS_ID }}
          VITE_GUACAL_GRAPHQL_API: ${{ vars.VITE_GUACAL_GRAPHQL_API }}
        run: |
          pnpm exec moon run web:build

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        shell: bash
        working-directory: apps/web
        run: |
          pnpm exec firebase deploy --only hosting --project 'el-guacal'


  ci-validation:
    name: CI validation
    needs: [test, build-and-deploy]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Check jobs for errors
        uses: actions/github-script@v8
        with:
          script: |
            const { default: checkJobsForErrors } = await import('${{ github.workspace }}/.github/scripts/check-for-errors.mjs');
            const jobs = ${{ toJSON(needs) }};
            checkJobsForErrors({ core, jobs });
