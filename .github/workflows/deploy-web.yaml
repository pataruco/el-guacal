name: Deploy web to production
run-name: ${{ github.actor }} is deploying web to Firebase Hosting with tag ${{ github.event.inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Select the web tag to deploy to production"
        required: true
        type: string
        default: "web-v0.1.0"

concurrency:
  cancel-in-progress: true
  group: "${{ github.workflow }} @ ${{ github.ref }}"

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout 🛎️
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Set environment and install dependencies
        uses: ./.github/actions/prepare

      - name: Run tests
        shell: bash
        run: |
          pnpm exec moon run web:test

  build-and-deploy:
    name: 📦 Build and deploy
    runs-on: ubuntu-latest
    needs: [test]
    environment:
      name: el-guacal-web
      url: "https://elguacal.com/"

    # Required permissions for Workload Identity Federation
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout 🛎️
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Set environment and install dependencies
        uses: ./.github/actions/prepare

      - name: Build web app
        shell: bash
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_MAPS_ID: ${{ vars.VITE_GOOGLE_MAPS_ID }}
          VITE_GUACAL_GRAPHQL_API: ${{ vars.VITE_GUACAL_GRAPHQL_API }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
        run: |
          pnpm exec moon run web:build

      - name: Authenticate to Google Cloud
        id: auth
        # v3
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        shell: bash
        working-directory: apps/web
        run: |
          pnpm exec firebase deploy --only hosting:web --project 'el-guacal'


  ci-validation:
    name: CI validation
    needs: [test, build-and-deploy]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout 🛎️
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Check jobs for errors
        uses: ./.github/actions/ci-validation
        with:
          jobs: ${{ toJSON(needs) }}
